version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node .yarn/releases/yarn-4.9.1.cjs install --immutable
    build:
      commands:
        - node .yarn/releases/yarn-4.9.1.cjs build
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - .yarn/cache/**/*
      - node_modules/**/*
